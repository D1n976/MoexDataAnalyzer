services:
  db:
    image: postgres:15-alpine
    container_name: moex_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=moexDatabase
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d moexDatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: moex_app
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/moexDatabase
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN}
    depends_on:
      db:
        condition: service_healthy